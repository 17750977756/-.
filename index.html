<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝暮与共，行至天光</title>
  <style>
    body {
      background: #111;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .video-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      max-width: 100vw;
    }
    video {
      max-width: 90vw;
      max-height: 70vh;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
      background: #000;
    }
    .caption {
      position: fixed;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      color: #fff;
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      background: rgba(0,0,0,0.3);
      padding: 0.6em 2em;
      border-radius: 2em;
      pointer-events: none;
      z-index: 10;
    }
    @media (max-width: 600px) {
      .caption {
        font-size: 1.2rem;
        padding: 0.4em 1em;
      }
      video {
        max-width: 98vw;
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video src="https://sns-video-hw.xhscdn.com/01e37340b5183ab501037003847a34f7ad_258.mp4?sign=e0e7bafd11769da1d62739ec9a086f13&t=66180900" controls autoplay loop></video>
  </div>
  <div class="caption">朝暮与共，行至天光</div>
</body>
</html>
