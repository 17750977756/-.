<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>朝暮与共，行至天光</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    body {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex; /* 使用flexbox居中 */
      justify-content: center;
      align-items: center;
    }
    video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* 确保视频铺满整个容器，可能会裁剪边缘 */
      z-index: 1;
      background: #000;
      /* pointer-events: none; /* 暂时移除，让点击事件能作用到视频本身或覆盖层 */
    }
    .caption {
      position: fixed;
      left: 50%;
      bottom: 7vh; /* 调整位置 */
      transform: translateX(-50%);
      color: #FF69B4; /* 粉色 */
      font-size: 3vw;
      font-family: "STXingkai", "华文行楷", "KaiTi", "楷体", cursive, sans-serif; /* 使用艺术字体 */
      font-weight: bold;
      letter-spacing: 0.15em; /* 字间距 */
      z-index: 3; /* 确保在覆盖层之上 */
      text-shadow:
        0 0 10px rgba(255, 105, 180, 0.8), /* 粉色发光效果 */
        0 0 20px rgba(255, 105, 180, 0.6),
        0 0 30px rgba(0, 0, 0, 0.4); /* 黑色阴影 */
      user-select: none;
      pointer-events: none; /* 让文字不阻挡点击事件 */
    }

    /* 播放提示覆盖层 */
    .play-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6); /* 半透明黑色背景 */
      z-index: 2; /* 在视频之上，在文字之下 */
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer; /* 鼠标悬停时显示手型 */
      opacity: 1;
      transition: opacity 0.5s ease-out; /* 平滑过渡 */
    }
    .play-overlay.hidden {
      opacity: 0;
      pointer-events: none; /* 隐藏后禁用点击事件 */
    }
    .play-button {
      color: #fff;
      font-size: 5vw;
      font-family: sans-serif; /* 提示文字使用简洁字体 */
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    @media (max-width: 600px) {
      .caption {
        font-size: 6vw; /* 手机端字体适配 */
        bottom: 5vh; /* 手机端位置适配 */
      }
      .play-button {
        font-size: 8vw; /* 手机端提示文字更大 */
      }
    }
  </style>
</head>
<body>
  <video id="backgroundVideo" src="https://sns-video-hw.xhscdn.com/01e37340b5183ab501037003847a34f7ad_258.mp4?sign=e0e7bafd11769da1d62739ec9a086f13&t=66180900"
         autoplay
         loop
         muted
         playsinline
         preload="auto"> <!-- 添加preload="auto"，尝试提前加载 -->
  </video>

  <div class="caption">朝暮与共，行至天光</div>

  <div class="play-overlay" id="playOverlay">
    <div class="play-button">点击播放</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('backgroundVideo');
      const playOverlay = document.getElementById('playOverlay');

      // 尝试在DOM加载完成后和视频准备好时播放（作为第一次尝试）
      video.play().catch(error => {
        console.warn('视频初始自动播放被阻止：', error);
        // 如果自动播放被阻止，显示覆盖层，等待用户交互
        playOverlay.classList.remove('hidden');
      });

      // 监听覆盖层的点击事件
      playOverlay.addEventListener('click', function() {
        video.play().then(() => {
          // 播放成功后隐藏覆盖层
          playOverlay.classList.add('hidden');
        }).catch(error => {
          console.error('用户点击后视频播放失败：', error);
          // 如果点击后仍然失败，可以给用户一些反馈，例如一个简单的提示
          alert('视频播放失败，请检查网络或浏览器设置。');
        });
      });

      // 确保视频加载可以播放时，隐藏覆盖层（如果之前显示过）
      video.addEventListener('canplaythrough', () => {
         // 如果视频已经播放了，或者用户已经点击过，就保持隐藏
         if (!video.paused || playOverlay.classList.contains('hidden')) {
             return;
         }
         // 如果视频还未播放，且覆盖层未隐藏，尝试再次播放
         video.play().then(() => {
             playOverlay.classList.add('hidden');
         }).catch(error => {
             console.warn('canplaythrough时视频播放被阻止：', error);
         });
      });

      // 处理视频加载失败的情况
      video.addEventListener('error', (e) => {
          console.error('视频加载错误：', e);
          playOverlay.innerHTML = '<div class="play-button" style="color:red;">视频加载失败，请重试</div>';
          playOverlay.classList.remove('hidden'); // 确保覆盖层显示错误信息
      });
    });
  </script>
</body>
</html>
