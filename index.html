<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朝暮与共</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }
    #loading {
      font-size: 18px;
      color: #ccc;
      margin-top: 20px;
    }
    video {
      width: 100%;
      max-width: 600px;
      height: auto;
      margin: 20px auto;
      display: block;
      border-radius: 12px;
      background: #000;
    }
    #subtitle {
      font-size: 22px;
      margin-top: 10px;
      color: #eee;
    }
  </style>
</head>
<body>

  <div id="loading">🎬 视频加载中，请稍候...</div>

  <video
    id="video1"
    muted
    autoplay
    loop
    playsinline
    controls
  >
    <source src="57e50d0c07182d658785025cd9f3ea1c.mp4" type="video/mp4" />
    您的浏览器不支持 video 标签，请尝试使用现代浏览器访问。
  </video>

  <div id="subtitle">朝暮与共，行至天光</div>

  <script>
    const video = document.getElementById('video1');
    const loading = document.getElementById('loading');

    video.oncanplay = () => {
      loading.style.display = 'none';
    };
  </script>

</body>
</html>
