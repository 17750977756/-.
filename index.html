<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝暮与共，行至天光</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      position: relative;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    .caption {
      position: fixed;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      color: #fff;
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      background: rgba(0,0,0,0.3);
      padding: 0.6em 2em;
      border-radius: 2em;
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 600px) {
      .caption {
        font-size: 1.2rem;
        padding: 0.4em 1em;
      }
    }
  </style>
</head>
<body>
  <video id="video1" muted autoplay loop playsinline src="57e50d0c07182d658785025cd9f3ea1c.mp4"></video>
  <div class="caption">朝暮与共，行至天光</div>
</body>
</html>
