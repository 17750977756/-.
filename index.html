<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>朝暮与共，行至天光</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    body {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      background: #000;
      pointer-events: none;
    }
    .caption {
      position: fixed;
      left: 50%;
      bottom: 7vh;
      transform: translateX(-50%);
      color: #fff;
      font-size: 3vw;
      font-family: "STXingkai", "华文行楷", "KaiTi", "楷体", cursive, sans-serif;
      font-weight: bold;
      letter-spacing: 0.15em;
      z-index: 2;
      text-shadow:
        0 0 8px #000,
        0 2px 12px #222,
        2px 2px 0 #fff,
        -2px -2px 0 #fff,
        2px -2px 0 #fff,
        -2px 2px 0 #fff;
      /* 艺术字描边+阴影 */
      user-select: none;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .caption {
        font-size: 6vw;
      }
    }
  </style>
</head>
<body>
  <video src="https://sns-video-hw.xhscdn.com/01e37340b5183ab501037003847a34f7ad_258.mp4?sign=e0e7bafd11769da1d62739ec9a086f13&t=66180900"
         autoplay
         loop
         muted
         playsinline>
  </video>
  <div class="caption">朝暮与共，行至天光</div>
</body>
</html>
